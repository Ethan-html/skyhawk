<!doctype html>
<html lang="en-US" style="visibility:hidden; background:white;">
  <head>
    <title>404 - Caution: Uncharted Airspace</title>
    <link href="/styles.css" rel="stylesheet">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      #page-overlay {
        position: fixed;
        inset: 0;
        background: white;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #page-overlay.hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }

      .loader {
        width: 40px;
        height: 40px;
        border: 4px solid #ccc;
        border-top-color: #1e3a8a;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

<script>
(async () => {
  const overlay = document.getElementById("page-overlay");

  const showPage = () => {
    document.documentElement.style.visibility = "visible";
    if (overlay) overlay.classList.add("hidden");
  };

  const redirect = (url) => {
    window.location.replace(url);
  };

  const path = window.location.pathname
    .replace(/^\/+|\/+$/g, "")
    .toLowerCase();

  // 🚫 Instant bypass for non-slug routes (IMPORTANT)
  if (!path || path === "404" || !/^[a-z0-9-]+$/.test(path)) {
    showPage();
    return;
  }

  let finished = false;

  // ⏱ HARD FALLBACK (4 seconds max)
  const fallbackTimer = setTimeout(() => {
    if (!finished) {
      finished = true;
      console.warn("Fallback triggered: showing page");
      showPage();
    }
  }, 4000);

  const controller = new AbortController();

  try {
    const res = await fetch(
      `https://admin.skyhawk-cap.org/api/v1/links/${path}`,
      {
        signal: controller.signal
      }
    );

    if (!finished && res.ok) {
      const data = await res.json();

      if (data?.url) {
        finished = true;
        clearTimeout(fallbackTimer);
        redirect(data.url);
        return;
      }
    }
  } catch (err) {
    console.warn("Redirect check failed:", err);
  }

  // 🔁 Final fallback (if fetch finishes early but no redirect)
  if (!finished) {
    finished = true;
    clearTimeout(fallbackTimer);
    showPage();
  }
})();
</script>
  </head>

  <body
    class="relative flex min-h-screen flex-col items-center justify-center overflow-hidden bg-capNavy text-white"
  >
    <div id="page-overlay">
      <div class="loader"></div>
    </div>

    <div
      aria-hidden="true"
      class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.08)_1px,transparent_1px),radial-gradient(circle_at_center,rgba(255,255,255,0.04)_2px,transparent_2px)] bg-[length:40px_40px,80px_80px] opacity-60"
    ></div>

    <main class="relative z-10 px-6 text-center">
      <p class="mb-3 text-sm font-semibold uppercase tracking-[0.25em] text-capGold/90">
        Caution: Uncharted Airspace
      </p>

      <h1 class="mb-4 text-6xl font-extrabold tracking-tight text-capGold drop-shadow lg:text-7xl">
        404
      </h1>

      <p class="mb-8 text-lg text-slate-100/90">
        The page you’re looking for has flown outside the charted area.<br />
        Please return to a known heading.
      </p>

      <a
        href="/"
        class="inline-flex items-center justify-center rounded-lg border-2 border-capGold bg-capBlue px-6 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-white shadow-md transition hover:-translate-y-0.5 hover:bg-blue-700 hover:text-capGold"
      >
        Return to Base
      </a>
    </main>
  </body>
</html>
