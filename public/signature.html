<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Civil Air Patrol Email Signature Generator</title>
    <meta
      name="description"
      content="Free Civil Air Patrol email signature generator. Build CAP-compliant HTML, plain text, or mobile signatures for Senior Members and Cadets in seconds."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.4/clipboard.min.js"></script>
    <script src="/assets/js/config.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        import(
          "/assets/js/init.js" + (window.ASSET_VERSION ? "?v=" + window.ASSET_VERSION : "")
        ).then((m) => m.initPage());
      });
    </script>
    <script type="text/javascript">
      let type = "generic";
      let grade_type = "Senior";

      const vals = {
        name: "Jane Doe",
        grade_type: "Senior",
        grade: "2nd Lt.",
        wing: "",
        title: "",
        phone_1_type: "M",
        phone_1: "",
        phone_2_type: "M",
        phone_2: "",
        phone_3_type: "M",
        phone_3: "",
        website_text: "",
        website_url: ""
      };

      const template = {
        generic: () =>
          `<!DOCTYPE html PUBLIC '-//W3C//DTD HTML 4.0 Transitional//EN" "http://www.w3.org/TR/REC-html40/loose.dtd"><html><body><br /><h1 style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #001871; font-weight: bold; margin: 0 0 5px;">${
            grade_type === "Cadet" ? "Cadet " : ""
          }${vals.grade && `${vals.grade} `}${vals.name}</h1>${
            vals.title
              ? `<h2 style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #9EA2A2; font-weight: normal; margin: 0 0 5px;">${vals.title}</h2>`
              : ""
          }<h2 style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #9EA2A2; font-weight: bold; margin: 0 0 20px;">Civil Air Patrol, U.S. Air Force Auxiliary</h2>${
            vals.phone_1
              ? `<p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #9EA2A2; font-weight: normal; margin: 0 0 5px;">(${vals.phone_1_type}) <a href="tel:${vals.phone_1}" style="color: #9EA2A2; text-decoration: none;">${vals.phone_1}</a></p>`
              : ""
          }${
            vals.phone_2
              ? `<p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #9EA2A2; font-weight: normal; margin: 0 0 5px;">(${vals.phone_2_type}) <a href="tel:${vals.phone_2}" style="color: #9EA2A2; text-decoration: none;">${vals.phone_2}</a></p>`
              : ""
          }${
            vals.phone_3
              ? `<p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #9EA2A2; font-weight: normal; margin: 0 0 5px;">(${vals.phone_3_type}) <a href="tel:${vals.phone_3}" style="color: #9EA2A2; text-decoration: none;">${vals.phone_3}</a></p>`
              : ""
          }<p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #001871; font-weight: normal; margin: 0 0 5px;"><a href="https://www.GoCivilAirPatrol.com" style="color: #001871; text-decoration: underline;">GoCivilAirPatrol.com</a></p>${
            vals.website_text && vals.website_url
              ? `<p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #001871; font-weight: normal; margin: 0 0 5px;"><a href="${vals.website_url}" style="color: #001871; text-decoration: underline;">${vals.website_text}</a></p>`
              : ""
          }<a href="https://www.GoCivilAirPatrol.com"><img src="https://www.gocivilairpatrol.com/media/cms/CAPEmailLogoNew_0F67A836DA869.png" style="margin: 10px 0 10px -5px;"></a><p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #9EA2A2; font-weight: normal; font-style: italic; white-space: normal; line-height: 14px; margin: 0 0 5px;">Volunteers serving America's communities, saving lives, and shaping futures.</p></body></html>`,
        plaintext: () =>
          `${grade_type === "Cadet" ? "Cadet" : ""}${vals.grade || ""} ${vals.name}${
            vals.title ? `\n${vals.title}` : ""
          }\nCivil Air Patrol, U.S. Air Force Auxiliary${
            vals.phone_1 || vals.phone_2 || vals.phone_3
              ? `\n${vals.phone_1 ? `\n(${vals.phone_1_type}) ${vals.phone_1}` : ""}${
                  vals.phone_2 ? `\n(${vals.phone_2_type}) ${vals.phone_2}` : ""
                }${vals.phone_3 ? `\n(${vals.phone_3_type}) ${vals.phone_3}` : ""}`
              : ""
          }\n\nhttps://www.GoCivilAirPatrol.com${vals.website_url ? `\n${vals.website_url}` : ""}`,
        mobile: () =>
          `${grade_type === "Cadet" ? "Cadet " : ""}${vals.grade} ${vals.name}${
            vals.wing ? `, ${vals.wing.toUpperCase()}` : ""
          }\nCivil Air Patrol`
      };

      $(document).ready(function () {
        updateOutput();

        $("#type").change(function () {
          type = $(this).val();

          if (type === "mobile") {
            $("#f_wing").show();
            $("#f_title").hide();
            $("#f_phone").hide();
            $("#f_website").hide();
          } else {
            $("#f_wing").hide();
            $("#f_title").show();
            $("#f_phone").show();
            $("#f_website").show();
          }

          if (type === "plaintext") {
            $("#website_text").hide();
          } else {
            $("#website_text").show();
          }

          if (type === "generic") {
            $(".middle").show();
          } else {
            $(".middle").hide();
          }

          updateInput();
          updateOutput();
        });

        $("#copy-output").click(function () {
          const e = document.getElementById("output");
          e.select();
          document.execCommand("copy");
        });

        $("#grade").on("change", function () {
          updateInput();
        });
        $("#name").on("keyup blur", function () {
          updateInput();
        });
        $("#wing").on("keyup blur", function () {
          updateInput();
        });
        $("#title").on("keyup blur", function () {
          updateInput();
        });
        $("#phone_1_type").change(function () {
          updateInput();
        });
        $("#phone_1").on("keyup blur", function () {
          updateInput();
        });
        $("#phone_2_type").change(function () {
          updateInput();
        });
        $("#phone_2").on("keyup blur", function () {
          updateInput();
        });
        $("#phone_3_type").change(function () {
          updateInput();
        });
        $("#phone_3").on("keyup blur", function () {
          updateInput();
        });
        $("#website_text").on("keyup blur", function () {
          updateInput();
        });
        $("#website_url").on("keyup blur", function () {
          updateInput();
        });

        $("#grade_type").change(function () {
          grade_type = $(this).val();

          // Gate the grades based on SM or Cadet
          if (grade_type === "Senior") {
            $('option[data-cadet="true"]').attr("disabled", "disabled");
            $('option[data-senior="true"]').removeAttr("disabled");
            $("#grade").val("");
          } else {
            $('option[data-senior="true"]').attr("disabled", "disabled");
            $('option[data-cadet="true"]').removeAttr("disabled");
            $("#grade").val("Airman");
          }

          updateInput();
        });
      });

      function updateInput() {
        vals["grade"] = $("#grade").val();

        if ($("#name").val()) {
          vals["name"] = $("#name").val();
        } else {
          vals["name"] = "Jane Doe";
        }

        vals["wing"] = $("#wing").val();
        vals["title"] = $("#title").val();
        vals["phone_1_type"] = $("#phone_1_type").val();
        vals["phone_1"] = $("#phone_1").val();
        vals["phone_2_type"] = $("#phone_2_type").val();
        vals["phone_2"] = $("#phone_2").val();
        vals["phone_3_type"] = $("#phone_3_type").val();
        vals["phone_3"] = $("#phone_3").val();
        vals["website_text"] = $("#website_text").val();
        vals["website_url"] = $("#website_url").val();

        updateOutput();
      }

      function updateOutput() {
        const output = template[type]();
        $("#output").val(output);
        $("#preview").html(output);
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="flex flex-col lg:flex-row h-screen bg-gray-100 font-ubuntu text-gray-900">
    <!-- LEFT PANEL -->
    <div class="lg:flex-1 lg:max-w-md bg-white p-4 shadow-md flex flex-col">
      <h1 class="text-3xl font-medium text-red-700 mb-2">Civil Air Patrol Email Signature Generator</h1>
      <p class="mb-6">Fill out your details below, and verify the preview in the right column is correct.</p>

      <form class="space-y-6">
        <!-- Signature Type -->
        <div>
          <label for="type" class="block mb-1 font-medium">Signature Type</label>
          <select id="type" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            <option value="generic">Default</option>
            <option value="plaintext">Plain Text</option>
            <option value="mobile">Abbreviated (Mobile)</option>
          </select>
        </div>

        <!-- Grade & Name -->
        <div>
          <label for="grade" class="block mb-1 font-medium">Grade & Name<span class="text-red-500">*</span></label>
          <div class="flex flex-col md:flex-row md:gap-2">
            <select id="grade_type" class="flex-1 border border-gray-300 rounded-md px-3 py-2">
              <option value="Senior" selected>Senior</option>
              <option value="Cadet">Cadet</option>
            </select>

            <select id="grade" class="flex-1 border border-gray-300 rounded-md px-3 py-2">
              <option value="Airman" data-cadet="true" disabled>Airman Basic</option>
              <option value="Airman" data-cadet="true" disabled>Airman</option>
              <option value="Airman 1st Class" data-cadet="true" disabled>Airman 1st Class</option>
              <option value="Senior Airman" data-cadet="true" disabled>Senior Airman</option>
              <option value="Staff Sgt.">Staff Sgt.</option>
              <option value="Tech. Sgt.">Tech. Sgt.</option>
              <option value="Master Sgt.">Master Sgt.</option>
              <option value="Senior Master Sgt.">Senior Master Sgt.</option>
              <option value="Chief Master Sgt.">Chief Master Sgt.</option>
              <option value="" data-senior="true">Senior Member</option>
              <option value="Flight Officer" data-senior="true">Flight Officer</option>
              <option value="Tech. Flight Officer" data-senior="true">Tech. Flight Officer</option>
              <option value="Senior Flight Officer" data-senior="true">Senior Flight Officer</option>
              <option value="2nd Lt." selected>2nd Lt.</option>
              <option value="1st Lt.">1st Lt.</option>
              <option value="Capt.">Capt.</option>
              <option value="Maj.">Maj.</option>
              <option value="Lt. Col.">Lt. Col.</option>
              <option value="Col.">Col.</option>
              <option value="Brig. Gen." data-senior="true">Brig. Gen.</option>
              <option value="Maj. Gen." data-senior="true">Maj. Gen.</option>
            </select>

            <input type="text" id="name" placeholder="Jane Doe" class="flex-1 border border-gray-300 rounded-md px-3 py-2" />
          </div>
        </div>

        <!-- Wing -->
        <div id="f_wing" class="hidden">
          <label for="wing" class="block mb-1 font-medium">Wing<span class="text-red-500">*</span>
            <span class="text-gray-400 text-xs float-right">Use 4-letter Wing, 3-letter Region, or “HQ”; no squadron designators</span>
          </label>
          <input type="text" id="wing" placeholder="TXWG" class="w-full border border-gray-300 rounded-md px-3 py-2" />
        </div>

        <!-- Title -->
        <div id="f_title">
          <label for="title" class="block mb-1 font-medium">Duty Position(s)
            <span class="text-gray-400 text-xs">Unit name followed by duty position</span>
          </label>
          <textarea id="title" placeholder="Texas Wing Director of Operations
      Apollo Comp. Sq. Operations Officer" class="w-full border border-gray-300 rounded-md px-3 py-2 min-h-[80px]"></textarea>
        </div>

        <!-- Phones -->
        <div id="f_phone" class="space-y-3">
          <label class="block mb-1 font-medium">Phone Number(s)</label>

          <div class="flex flex-col md:flex-row md:gap-2">
            <select id="phone_1_type" class="flex-1 border border-gray-300 rounded-md px-3 py-2">
              <option value="M" selected>Mobile</option>
              <option value="H">Home</option>
              <option value="O">Office</option>
            </select>
            <input type="text" id="phone_1" placeholder="555-555-5555" class="flex-1 border border-gray-300 rounded-md px-3 py-2" />
          </div>

          <div class="flex flex-col md:flex-row md:gap-2">
            <select id="phone_2_type" class="flex-1 border border-gray-300 rounded-md px-3 py-2">
              <option value="M" selected>Mobile</option>
              <option value="H">Home</option>
              <option value="O">Office</option>
            </select>
            <input type="text" id="phone_2" placeholder="555-555-5555" class="flex-1 border border-gray-300 rounded-md px-3 py-2" />
          </div>

          <div class="flex flex-col md:flex-row md:gap-2">
            <select id="phone_3_type" class="flex-1 border border-gray-300 rounded-md px-3 py-2">
              <option value="M" selected>Mobile</option>
              <option value="H">Home</option>
              <option value="O">Office</option>
            </select>
            <input type="text" id="phone_3" placeholder="555-555-5555" class="flex-1 border border-gray-300 rounded-md px-3 py-2" />
          </div>
        </div>

        <!-- Website -->
        <div id="f_website">
          <label for="website_text" class="block mb-1 font-medium">Website</label>
          <div class="flex flex-col md:flex-row md:gap-2">
            <input type="text" id="website_text" placeholder="Display Text" class="flex-1 border border-gray-300 rounded-md px-3 py-2" />
            <input type="text" id="website_url" placeholder="Link URL" class="flex-1 border border-gray-300 rounded-md px-3 py-2" />
          </div>
        </div>
      </form>
    </div>

    <!-- MIDDLE PANEL -->
    <div class="lg:flex-1 p-6 bg-gray-100">
      <p class="mb-3 text-sm text-gray-700">
        If your email client supports HTML signatures, copy and paste the content from below. If it
        doesn't, highlight, copy and paste the content from the right column.
      </p>
      <textarea id="output" class="w-full h-64 border border-gray-300 rounded-md p-3 font-mono text-sm mb-3"></textarea>
      <button id="copy-output" class="w-full lg:w-auto bg-blue-900 hover:bg-blue-800 text-white rounded-md px-5 py-2 transition">Copy</button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="lg:flex-1 bg-white p-6 shadow-md">
      <div id="preview" class="p-5"></div>
    </div>
  </body>
</html>
