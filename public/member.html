<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBk_ikYB1PzkgHx4zJY73pe3EfzQRpZvqw",
  authDomain: "skyhawk-web.firebaseapp.com",
  projectId: "skyhawk-web",
  storageBucket: "skyhawk-web.firebasestorage.app",
  messagingSenderId: "340655139001",
  appId: "1:340655139001:web:7923a1fe83ac4a4c689368",
  measurementId: "G-M2RSE2BRK2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();

function sortByOptionalOrderId(items) {
  return items.sort((a, b) => (Number(a.orderid) || 9999) - (Number(b.orderid) || 9999));
}

function createChevron() {
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 20 20");
  svg.setAttribute("fill","currentColor");
  svg.classList.add("ml-2","h-4","w-4","transition-transform");
  svg.innerHTML = `<path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>`;
  return svg;
}

async function fetchMenuFromFirebase() {
  try {
    const pagesCol = collection(db, "member","menu","pages");
    const pagesSnap = await getDocs(pagesCol);
    return Promise.all(
      pagesSnap.docs.map(async doc => {
        const childrenSnap = await getDocs(collection(doc.ref,"children"));
        return { page: doc.data(), children: childrenSnap.docs.map(d=>d.data()) };
      })
    );
  } catch(err){ console.warn("Menu fetch failed:",err); return []; }
}

// Desktop
function buildDesktopMenu(menuData) {
  const container = document.getElementById("desktopMenu");
  container.replaceChildren();

  menuData.forEach(item => {
    const li = document.createElement("li");
    li.className = "relative flex items-stretch h-full";

    const hasChildren = item.children?.length > 0;
    const trigger = document.createElement(hasChildren ? "button" : "a");
    trigger.className =
      "flex items-center px-6 max-[1250px]:px-4 max-[1165px]:px-3 max-[840px]:px-2 h-full text-lg max-[1250px]:text-base max-[1165px]:text-sm max-[840px]:text-xs font-semibold uppercase tracking-wide text-white/95 border-t-2 border-transparent hover:bg-white/10 hover:text-white hover:border-accent focus:outline-none focus:ring-2 focus:ring-accent/70";
    trigger.textContent = item.page.title || "Untitled";

    if (!hasChildren) {
      trigger.href = item.page.url || "#";
    } else {
      trigger.type = "button";
      trigger.setAttribute("aria-expanded", "false");
      trigger.appendChild(createChevron());
    }

    li.appendChild(trigger);

    if (hasChildren) {
      const submenu = document.createElement("div");
      submenu.className =
        "absolute left-0 top-full min-w-full w-max opacity-0 pointer-events-none transition-opacity duration-150";

      const inner = document.createElement("div");
      inner.className =
        "bg-slate-900/95 backdrop-blur-sm border border-white/10 rounded-b-xl overflow-hidden text-sm";

      const ul = document.createElement("ul");
      sortByOptionalOrderId(item.children).forEach(child => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = child.url || "#";
        a.textContent = child.title || "—";
        a.className =
          "block px-6 py-3 text-white/90 hover:bg-white/10 hover:text-white transition-colors";
        li.appendChild(a);
        ul.appendChild(li);
      });

      inner.appendChild(ul);
      submenu.appendChild(inner);
      li.appendChild(submenu);

      // Explicit JS hover show/hide
      let timeout;
      li.addEventListener("mouseenter", () => {
        clearTimeout(timeout);

        // 🔥 CLOSE ALL OTHER MENUS FIRST
        document.querySelectorAll("#desktopMenu [aria-expanded='true']").forEach(btn => {
          if (btn !== trigger) {
            btn.setAttribute("aria-expanded", "false");
            const parent = btn.closest("li");
            const menu = parent?.querySelector("div");
            if (menu) {
              menu.style.opacity = "0";
              menu.style.pointerEvents = "none";
              submenu.style.transform = "none";
            }
          }
        });

        // OPEN THIS ONE
        submenu.style.opacity = "1";
        submenu.style.pointerEvents = "auto";
        submenu.style.transform = "none";
        trigger.setAttribute("aria-expanded", "true");
      });
      li.addEventListener("mouseleave", () => {
        timeout = setTimeout(() => {
          submenu.style.opacity = "0";
          submenu.style.pointerEvents = "none";
          submenu.style.transform = "translateY(5px)";
          trigger.setAttribute("aria-expanded", "false");
        }, 150);
      });
    }

    container.appendChild(li);
  });
}

// Mobile
function buildMobileMenu(menuData){
  const root=document.getElementById("mobilePanelRoot"); root.replaceChildren();
  const ul=document.createElement("ul"); ul.className="space-y-1 px-2";

  menuData.forEach(({page,children})=>{
    const li=document.createElement("li");
    const a=document.createElement("a"); a.href=page.url||"#"; a.textContent=page.title||"—";
    a.className="flex justify-between items-center px-5 py-3.5 font-medium text-white rounded-lg hover:bg-white/10 transition-colors";

    if(children?.length){
      const chevron=createChevron(); chevron.classList.add("h-4","w-4"); a.appendChild(chevron);
      const subUl=document.createElement("ul"); subUl.className="hidden pl-4 mt-1 space-y-1";

      sortByOptionalOrderId(children).forEach(child=>{
        const subLi=document.createElement("li");
        const subA=document.createElement("a"); subA.href=child.url||"#"; subA.textContent=child.title||"—";
        subA.className="block px-6 py-2.5 text-white/85 rounded hover:bg-white/10 transition-colors";
        subLi.appendChild(subA); subUl.appendChild(subLi);
      });

      li.append(a,subUl);
      a.addEventListener("click",e=>{
        e.preventDefault();
        const open=!subUl.classList.contains("hidden");
        root.querySelectorAll("ul ul").forEach(ul=>{ul.classList.add("hidden"); ul.previousElementSibling?.querySelector("svg")?.classList.remove("rotate-180");});
        if(!open){ subUl.classList.remove("hidden"); chevron.classList.add("rotate-180"); }
      });
    } else li.appendChild(a);

    ul.appendChild(li);
  });
  root.appendChild(ul);
}

// Mobile toggle
const toggleBtn=document.getElementById("mobileMenuToggle");
const closeBtn=document.getElementById("mobileCloseBtn");
const drawer=document.getElementById("mobileDrawer");
const backdrop=document.getElementById("mobileBackdrop");
const body=document.body;

function openMobile(){
  drawer.classList.remove("-translate-x-full");
  backdrop.classList.remove("hidden");
  body.classList.add("mobile-menu-open");
}
function closeMobile(){
  drawer.classList.add("-translate-x-full");
  backdrop.classList.add("hidden");
  body.classList.remove("mobile-menu-open");
}

toggleBtn.addEventListener("click",()=>{ drawer.classList.contains("-translate-x-full")?openMobile():closeMobile(); });
closeBtn.addEventListener("click",closeMobile);
backdrop.addEventListener("click",closeMobile);

// Init
(async()=>{
  const data=await fetchMenuFromFirebase();
  if(data.length===0)return;
  buildDesktopMenu(data);
  buildMobileMenu(data);
})();
</script>
